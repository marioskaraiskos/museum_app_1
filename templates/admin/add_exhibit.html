{% extends "base.html" %}
{% block content %}

<h2>Add Exhibit</h2>

<form method="post" action="{{ url_for('admin_add_exhibit') }}">
    <label>Title</label>
    <input type="text" name="title" required>

    <label>Description</label>
    <textarea name="description" rows="10" required></textarea>

    <button type="submit">Add Exhibit</button>
</form>

<a href="{{ url_for('admin_exhibits') }}">Cancel</a>

{% endblock %}
