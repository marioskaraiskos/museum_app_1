{% extends "base.html" %}
{% block content %}

<h2>Manage Exhibits</h2>

<p><a href="{{ url_for('admin_add_exhibit') }}">+ Add New Exhibit</a></p>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Created By</th>
        <th>Created</th>
        <th>Actions</th>
    </tr>
    {% for ex in exhibits %}
    <tr>
        <td>{{ ex.id }}</td>
        <td>{{ ex.title }}</td>
        <td>{{ ex.created_by }}</td>
        <td>{{ ex.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
        <td>
            <a href="{{ url_for('admin_edit_exhibit', exhibit_id=ex.id) }}">Edit</a> |
            <form method="post" action="{{ url_for('admin_delete_exhibit', exhibit_id=ex.id) }}" style="display:inline;">
                <button type="submit" onclick="return confirm('Are you sure?')">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>

{% endblock %}
