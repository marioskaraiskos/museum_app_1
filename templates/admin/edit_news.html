{% extends "base.html" %}
{% block content %}

<h2>Edit News</h2>

<form method="post" action="{{ url_for('admin_edit_news', news_id=news.id) }}">
    <label>Title</label>
    <input type="text" name="title" value="{{ news.title }}" required>

    <label>Content</label>
    <textarea name="content" rows="10" required>{{ news.content }}</textarea>

    <button type="submit">Update News</button>
</form>

<a href="{{ url_for('admin_news') }}">Cancel</a>

{% endblock %}
