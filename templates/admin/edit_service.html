{% extends "base.html" %}
{% block content %}

<h2>Edit Service</h2>

<form method="post" action="{{ url_for('admin_edit_service', service_id=service.id) }}">
    <label>Title</label>
    <input type="text" name="title" value="{{ service.title }}" required>

    <label>Description</label>
    <textarea name="description" rows="10" required>{{ service.description }}</textarea>

    <button type="submit">Update Service</button>
</form>

<a href="{{ url_for('admin_services') }}">Cancel</a>

{% endblock %}
