{% extends "base.html" %}
{% block content %}

<h2>Add Event</h2>

<form method="post" action="{{ url_for('admin_add_event') }}">
    <label>Title</label>
    <input type="text" name="title" required>

    <label>Date (YYYY-MM-DD)</label>
    <input type="text" name="date" placeholder="2026-01-31" required>

    <label>Start Time (HH:MM)</label>
    <input type="text" name="start" placeholder="14:00" required>

    <label>End Time (HH:MM)</label>
    <input type="text" name="end" placeholder="16:00" required>

    <label>Description</label>
    <textarea name="description" rows="10" required></textarea>

    <button type="submit">Add Event</button>
</form>

<a href="{{ url_for('admin_events') }}">Cancel</a>

{% endblock %}
