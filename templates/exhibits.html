{% extends "base.html" %}
{% block content %}

<h2>Exhibits</h2>
<ul class="card-list">
    {% for ex in exhibits %}
        <li class="card">
                <h3>{{ ex.title }}</h3>
                <p>{{ ex.description }}</p>
        </li>
    {% else %}
        <p>No exhibits available.</p>
    {% endfor %}
</ul>

{% endblock %}
